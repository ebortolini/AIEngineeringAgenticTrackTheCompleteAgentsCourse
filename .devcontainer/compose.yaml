version: "3"
services:
  mcp-fetch:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    environment:
      PYTHONPATH: /workspaces/.venv/bin
    volumes:
      - ..:/workspaces
    ports:
      - 8888:8888
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --NotebookApp.token='' --NotebookApp.password='' --allow-root --notebook-dir=/workspaces